name: Weekly Release Check

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

env:
  ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
  DB_PASS: password
  COMPOSE_PROJECT_NAME: jls

jobs:
  weekly-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install npm dependencies
        run: npm ci

      - name: Ensure Docker Compose is available
        run: docker compose version

      - name: Install redis-cli for telemetry snapshots
        run: sudo apt-get update && sudo apt-get install -y redis-tools

      - name: Prepare secret files
        run: bash scripts/prepare-secrets.sh

      - name: Build and launch stack
        run: docker compose up --build -d

      - name: Run weekly release gate
        run: bash scripts/weekly-release-check.sh

      - name: Upload weekly release evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: weekly-release-evidence
          path: |
            logs
            replay-dumps

      - name: Tear down stack
        if: ${{ always() }}
        run: docker compose down -v
