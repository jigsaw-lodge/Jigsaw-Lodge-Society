# Nginx site definition for the Hetzner host. Drop this into
# /etc/nginx/sites-available/jigsawlodgesociety.com and symlink it to sites-enabled after
# adjusting the upstream paths (documents live in /var/www/jigsawlodgesociety).

map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

map $sent_http_content_type $expires {
  default                    off;
  text/css                   1h;
  application/javascript     1h;
  application/json           off;
  text/html                  off;
}

server {
  listen 80;
  server_name jigsawlodgesociety.com www.jigsawlodgesociety.com api.jigsawlodgesociety.com ws.jigsawlodgesociety.com;

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name jigsawlodgesociety.com www.jigsawlodgesociety.com;

  root /var/www/jigsawlodgesociety;
  index index.html;

  ssl_certificate /etc/letsencrypt/live/jigsawlodgesociety.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/jigsawlodgesociety.com/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "same-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_vary on;
  gzip_types
    text/plain
    text/css
    application/json
    application/javascript
    application/xml
    image/svg+xml;

  # Avoid accidental huge uploads.
  client_max_body_size 256k;

  location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|mp3|woff2?)$ {
    expires $expires;
    add_header Cache-Control "public, max-age=3600" always;
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ^~ /api/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  location = /api {
    return 307 /api/;
  }
}

server {
  listen 443 ssl http2;
  server_name api.jigsawlodgesociety.com;

  ssl_certificate /etc/letsencrypt/live/jigsawlodgesociety.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/jigsawlodgesociety.com/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "same-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  client_max_body_size 256k;

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }
}

server {
  listen 443 ssl http2;
  server_name ws.jigsawlodgesociety.com;

  ssl_certificate /etc/letsencrypt/live/jigsawlodgesociety.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/jigsawlodgesociety.com/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "same-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

  location / {
    proxy_pass http://127.0.0.1:3010;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;
  }
}
