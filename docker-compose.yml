version: "3.9"

services:
  db:
    image: postgres:15
    container_name: jls_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/db_pass
      POSTGRES_DB: jls
    volumes:
      - jls_db_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./secrets:/run/secrets:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    container_name: jls_redis
    restart: always
    ports:
      - "6380:6379"

  backend:
    build: .
    container_name: jls_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      ADMIN_TOKEN_FILE: ${ADMIN_TOKEN_FILE:-}
      JLS_SHARED_TOKEN_FILE: ${JLS_SHARED_TOKEN_FILE:-}
      JLS_SIGNING_SECRET_FILE: ${JLS_SIGNING_SECRET_FILE:-}
      JLS_SIGNING_MAX_SKEW_SEC: ${JLS_SIGNING_MAX_SKEW_SEC:-120}
      JLS_SIGNING_NONCE_TTL_SEC: ${JLS_SIGNING_NONCE_TTL_SEC:-300}
      JLS_REQUIRE_SIGNED_REQUESTS: ${JLS_REQUIRE_SIGNED_REQUESTS:-0}
      JLS_SECRET_DIR: /run/secrets
      REDIS_URL: redis://redis:6379
      DB_HOST: db
      DB_USER: postgres
      DB_PASS_FILE: ${DB_PASS_FILE:-}
      DB_NAME: jls
      DB_PORT: 5432
    volumes:
      - ./secrets:/run/secrets:ro
    ports:
      - "3000:3000"

  worker:
    build: .
    container_name: jls_worker
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
    environment:
      JLS_SECRET_DIR: /run/secrets
      REDIS_URL: redis://redis:6379
      DB_HOST: db
      DB_USER: postgres
      DB_PASS_FILE: ${DB_PASS_FILE:-}
      DB_NAME: jls
      DB_PORT: 5432
    volumes:
      - ./secrets:/run/secrets:ro
    command: ["node", "workers/engineWorker.js"]

  relay:
    build: .
    container_name: jls_relay
    restart: always
    depends_on:
      redis:
        condition: service_started
    environment:
      JLS_SECRET_DIR: /run/secrets
      REDIS_URL: redis://redis:6379
      WS_PORT: 3010
      WS_HOST: 0.0.0.0
    command: ["node", "wsrelay.js"]
    volumes:
      - ./secrets:/run/secrets:ro
    ports:
      - "3010:3010"

  k6:
    image: grafana/k6:0.54.0
    container_name: jls_k6
    depends_on:
      backend:
        condition: service_started
    environment:
      BASE_URL: http://backend:3000
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["k6"]

volumes:
  jls_db_data:
