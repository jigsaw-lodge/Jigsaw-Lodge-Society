name: Artifact Smoke CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
  BASE_URL: http://localhost:3000
  WS_URL: ws://relay:3010

jobs:
  artifact-smoke:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install npm dependencies
        run: npm ci

      - name: Ensure Docker Compose is available
        run: docker compose version

      - name: Build and launch stack
        run: |
          COMPOSE_PROJECT_NAME=jls ADMIN_TOKEN=${{ env.ADMIN_TOKEN }} docker compose up --build -d

      - name: Wait for API to become healthy
        run: |
          for i in {1..30}; do
            if curl -fs http://localhost:3000/api/health >/dev/null; then
              echo "API is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "timeout waiting for API health" >&2
          exit 1

      - name: Run artifact-smoke validation
        run: |
          COMPOSE_PROJECT_NAME=jls ADMIN_TOKEN=${{ env.ADMIN_TOKEN }} docker compose exec -T backend sh -c 'cd /app && ADMIN_TOKEN=${{ env.ADMIN_TOKEN }} BASE_URL=${{ env.BASE_URL }} WS_URL=${{ env.WS_URL }} node scripts/run-artifact-smoke.js'

      - name: Collect replay dumps
        if: ${{ always() }}
        run: |
          mkdir -p replay-dumps
          if COMPOSE_PROJECT_NAME=jls docker ps --filter name=jls_backend --format '{{.Names}}' | grep -q jls_backend; then
            COMPOSE_PROJECT_NAME=jls docker cp jls_backend:/app/replay-dumps replay-dumps || true
          fi

      - name: Tear down stack
        if: ${{ always() }}
        run: COMPOSE_PROJECT_NAME=jls ADMIN_TOKEN=${{ env.ADMIN_TOKEN }} docker compose down -v

      - name: Upload replay dumps
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: artifact-smoke-replays
          path: replay-dumps
