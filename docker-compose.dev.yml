version: "3.9"

# Dev override: hot-reload services so we don't rebuild on every code change.
# Use with:
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  backend:
    image: node:20
    working_dir: /app
    volumes:
      - ./:/app
      - jls_node_modules:/app/node_modules
      - ./secrets:/run/secrets:ro
    command: ["bash", "-lc", "npm install && node --watch server.js"]
    environment:
      JLS_SHARED_TOKEN_FILE: ${JLS_SHARED_TOKEN_FILE:-}
      JLS_SIGNING_SECRET_FILE: ${JLS_SIGNING_SECRET_FILE:-}
      JLS_SIGNING_MAX_SKEW_SEC: ${JLS_SIGNING_MAX_SKEW_SEC:-120}
      JLS_SIGNING_NONCE_TTL_SEC: ${JLS_SIGNING_NONCE_TTL_SEC:-300}
      JLS_REQUIRE_SIGNED_REQUESTS: ${JLS_REQUIRE_SIGNED_REQUESTS:-0}
      JLS_SECRET_DIR: /run/secrets
      LOG_LEVEL: ${LOG_LEVEL:-info}

  worker:
    image: node:20
    working_dir: /app
    volumes:
      - ./:/app
      - jls_node_modules:/app/node_modules
      - ./secrets:/run/secrets:ro
    command: ["bash", "-lc", "npm install && node --watch workers/engineWorker.js"]
    environment:
      JLS_SECRET_DIR: /run/secrets
      LOG_LEVEL: ${LOG_LEVEL:-info}

  relay:
    image: node:20
    working_dir: /app
    volumes:
      - ./:/app
      - jls_node_modules:/app/node_modules
      - ./secrets:/run/secrets:ro
    command: ["bash", "-lc", "npm install && node --watch wsrelay.js"]
    environment:
      JLS_SECRET_DIR: /run/secrets
      LOG_LEVEL: ${LOG_LEVEL:-info}

volumes:
  jls_node_modules:
