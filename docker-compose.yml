version: "3.9"

services:
  db:
    image: postgres:15
    container_name: jls_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: jls
    volumes:
      - jls_db_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7
    container_name: jls_redis
    restart: always
    ports:
      - "6380:6379"

  backend:
    build: .
    container_name: jls_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      REDIS_URL: redis://redis:6379
      DB_HOST: db
      DB_USER: postgres
      DB_PASS: password
      DB_NAME: jls
      DB_PORT: 5432
    ports:
      - "3000:3000"

  worker:
    build: .
    container_name: jls_worker
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
    environment:
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      REDIS_URL: redis://redis:6379
      DB_HOST: db
      DB_USER: postgres
      DB_PASS: password
      DB_NAME: jls
      DB_PORT: 5432
    command: ["node", "workers/engineWorker.js"]

  relay:
    build: .
    container_name: jls_relay
    restart: always
    depends_on:
      redis:
        condition: service_started
    environment:
      REDIS_URL: redis://redis:6379
      WS_PORT: 3010
      WS_HOST: 0.0.0.0
    command: ["node", "wsrelay.js"]
    ports:
      - "3010:3010"

volumes:
  jls_db_data:
